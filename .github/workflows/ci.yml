name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --passWithNoTests --ci

      - name: Domain boundary check
        run: node scripts/check-domain-boundaries.js

      - name: Seed JSON validation
        run: node scripts/validate-seed-json.js
